<div class="bg-slate-950 border border-slate-800 p-6 rounded-2xl shadow-xl">
  <div class="flex justify-between items-center mb-6">
    <h3 class="text-sm font-bold uppercase tracking-wider text-slate-300">Financial Ledger & Settlement Records</h3>
    <button class="text-xs bg-slate-900 hover:bg-slate-800 text-cyan-400 border border-slate-700 px-4 py-2 rounded-lg transition-colors">
      Export CSV Report
    </button>
  </div>
  
  <div class="overflow-x-auto">
    <table class="w-full text-left text-xs">
      <thead>
        <tr class="border-b border-slate-800 text-slate-400 uppercase tracking-wider font-semibold">
          <th class="pb-3 px-2">Transaction Ref</th>
          <th class="pb-3 px-2">Tender ID</th>
          <th class="pb-3 px-2">Operator Entity</th>
          <th class="pb-3 px-2">Gross Allocation</th>
          <th class="pb-3 px-2 text-right">Status Guard State</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-800/50 text-slate-300">
        
        <tr *ngFor="let txn of transactions" class="hover:bg-slate-900/40 transition-colors group">
          <td class="py-4 px-2 font-mono text-slate-500 group-hover:text-slate-300 transition-colors">{{ txn.id }}</td>
          <td class="py-4 px-2 font-semibold text-cyan-400">{{ txn.tenderId }}</td>
          <td class="py-4 px-2">{{ txn.operator }}</td>
          <td class="py-4 px-2 font-mono font-bold text-slate-200">{{ txn.amount | currency:'USD' }}</td>
          <td class="py-4 px-2 text-right">
            
            <span *ngIf="txn.status === 'cleared'" class="inline-flex items-center px-2.5 py-1 rounded-md text-[10px] font-medium bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 uppercase tracking-wider">
              Cleared & Settled
            </span>
            
            <span *ngIf="txn.status === 'escrow'" class="inline-flex items-center px-2.5 py-1 rounded-md text-[10px] font-medium bg-amber-500/10 text-amber-400 border border-amber-500/20 uppercase tracking-wider">
              Escrow Locked
            </span>
            
          </td>
        </tr>

      </tbody>
    </table>
  </div>
</div>
