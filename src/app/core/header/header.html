<header [class.ml-20]="isSidebarCollapsed" [class.ml-64]="!isSidebarCollapsed"
        class="h-16 border-b border-slate-800 flex items-center justify-between px-6 lg:px-8 bg-slate-950/80 backdrop-blur-md sticky top-0 z-20 transition-all duration-300">

  <div class="flex items-center space-x-3">
    <div class="flex items-center">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" class="h-10 w-10 drop-shadow-[0_0_8px_rgba(34,211,238,0.35)] mr-2" aria-hidden="true">
        <defs>
          <linearGradient id="renta-fast-header" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22d3ee" />
            <stop offset="100%" stop-color="#3b82f6" />
          </linearGradient>
        </defs>
        <path d="M22 52 L30 16" stroke="url(#renta-fast-header)" stroke-width="6" stroke-linecap="round" />
        <path d="M30 16 H44 C50.6 16 52 23 48 30 C44 37 38 36 34 36" stroke="url(#renta-fast-header)" stroke-width="6" stroke-linecap="round" />
        <path d="M36 36 L50 52" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" />
        <path d="M40 52 H50 V42" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <h2 [ngClass]="isSidebarCollapsed ? 'text-2xl tracking-tight' : 'text-lg tracking-wide'" class="font-semibold text-slate-200 transition-all duration-300">Truck Rental Dashboard</h2>
  </div>
  
  <div class="flex items-center space-x-6">
    <div *ngIf="currentUser; else guestState" class="flex items-center space-x-3 border-l border-slate-800 pl-6">
      <div class="w-9 h-9 rounded-full bg-cyan-900 border border-cyan-500 flex items-center justify-center text-cyan-400 font-bold text-xs uppercase">
        {{ currentUser.role === 'partner' ? 'P' : 'C' }}
      </div>
      <div class="flex flex-col">
        <span class="text-sm font-semibold text-slate-200">{{ getDisplayName(currentUser) }}</span>
        <span class="text-xs text-slate-400">{{ roleLabel }}</span>
      </div>
      <button type="button" (click)="logout()" class="ml-2 rounded-full border border-slate-700 px-2.5 py-1 text-[11px] font-medium text-slate-300 hover:border-cyan-500 hover:text-cyan-300">
        Logout
      </button>
    </div>

    <ng-template #guestState>
      <div class="flex items-center space-x-3 border-l border-slate-800 pl-6">
        <div class="w-9 h-9 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-400 font-bold text-xs">
          G
        </div>
        <span class="text-sm font-medium text-slate-400">Guest</span>
      </div>
    </ng-template>
  </div>
</header>
