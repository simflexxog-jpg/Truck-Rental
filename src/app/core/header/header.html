<header [ngClass]="isSidebarCollapsed ? 'ml-20' : 'ml-64'" 
        class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-slate-950/80 backdrop-blur-md sticky top-0 z-20 transition-all duration-300">
  
  <h2 class="text-lg font-semibold text-slate-200 tracking-wide">System Gateway Overview</h2>
  
  <div class="flex items-center space-x-6">
    <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-emerald-950 text-emerald-400 border border-emerald-800/50">
      <span class="w-2 h-2 rounded-full bg-emerald-400 mr-2 animate-pulse"></span>
      Engine Online
    </span>

    <div class="flex items-center space-x-3 border-l border-slate-800 pl-6 cursor-pointer hover:opacity-80 transition-opacity">
      <div class="w-8 h-8 rounded-full bg-cyan-900 border border-cyan-500 flex items-center justify-center text-cyan-400 font-bold text-xs">
        OP
      </div>
      <span class="text-sm font-medium text-slate-300">Operator Alpha</span>
    </div>
  </div>
</header>
