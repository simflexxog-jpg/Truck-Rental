<aside [ngClass]="isSidebarCollapsed ? 'w-20' : 'w-64'" 
       class="h-screen bg-slate-950 border-r border-slate-800 flex flex-col justify-between transition-all duration-300 ease-in-out z-30 fixed left-0 top-0">
  
  <div>
    <div class="p-4 flex items-center justify-between border-b border-slate-800 h-16">
      <span *ngIf="!isSidebarCollapsed" class="text-xl font-bold tracking-wider bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent whitespace-nowrap">
        LOGI-CORE
      </span>
      <button (click)="toggleSidebar()" class="p-2 rounded-lg hover:bg-slate-800 transition-colors mx-auto text-cyan-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
    </div>

    <nav class="p-4 space-y-2 mt-2">
      <a routerLink="/login" routerLinkActive="bg-slate-800 text-cyan-400" class="flex items-center space-x-4 p-3 rounded-xl hover:bg-slate-800 transition-all text-slate-400 hover:text-cyan-400 group cursor-pointer">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
        <span *ngIf="!isSidebarCollapsed" class="font-medium whitespace-nowrap">Access Terminal</span>
      </a>
      
      <a routerLink="/customer" routerLinkActive="bg-slate-800 text-cyan-400" class="flex items-center space-x-4 p-3 rounded-xl hover:bg-slate-800 transition-all text-slate-400 hover:text-cyan-400 group cursor-pointer">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <span *ngIf="!isSidebarCollapsed" class="font-medium whitespace-nowrap">Client Dashboard</span>
      </a>
      
      <a routerLink="/partner" routerLinkActive="bg-slate-800 text-cyan-400" class="flex items-center space-x-4 p-3 rounded-xl hover:bg-slate-800 transition-all text-slate-400 hover:text-cyan-400 group cursor-pointer">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10M13 16h4l4 4V13a1 1 0 00-1-1h-3m-4 0H9v4"/></svg>
        <span *ngIf="!isSidebarCollapsed" class="font-medium whitespace-nowrap">Fleet Hub</span>
      </a>
      
      <a routerLink="/billing" routerLinkActive="bg-slate-800 text-cyan-400" class="flex items-center space-x-4 p-3 rounded-xl hover:bg-slate-800 transition-all text-slate-400 hover:text-cyan-400 group cursor-pointer">
        <svg class="h-6 w-6 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
        <span *ngIf="!isSidebarCollapsed" class="font-medium whitespace-nowrap">Billing & Escrow</span>
      </a>
    </nav>
  </div>
  
  <div class="p-4 border-t border-slate-800 text-xs text-center text-slate-600 whitespace-nowrap" *ngIf="!isSidebarCollapsed">
    © 2026 Logi-Core Systems
  </div>
</aside>
