<aside [ngClass]="(isSidebarCollapsed$ | async) ? 'w-20' : 'w-64'" 
       class="h-screen bg-slate-950 border-r border-slate-800 flex flex-col justify-between transition-all duration-300 ease-in-out z-40 fixed left-0 top-0">
  
  <div>
    <div class="p-4 flex items-center justify-between border-b border-slate-800 h-16">
      <span *ngIf="!(isSidebarCollapsed$ | async)" class="text-xl font-bold tracking-wider bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent whitespace-nowrap">
        LOGI-CORE
      </span>
      <button (click)="toggleSidebar()" class="p-2 rounded-lg hover:bg-slate-800 transition-colors mx-auto text-cyan-400" title="Toggle sidebar" aria-label="Toggle sidebar">
        <svg lucideMenu class="h-6 w-6"></svg>
      </button>
    </div>

    <nav class="p-4 space-y-2 mt-2">
      <a routerLink="/login" routerLinkActive="bg-slate-800 text-cyan-400" class="flex items-center space-x-4 p-3 rounded-xl hover:bg-slate-800 transition-all text-slate-400 hover:text-cyan-400 group cursor-pointer">
        <svg lucideLogOut class="h-6 w-6 shrink-0"></svg>
        <span *ngIf="!(isSidebarCollapsed$ | async)" class="font-medium whitespace-nowrap">Access Terminal</span>
      </a>
      
      <a routerLink="/customer" routerLinkActive="bg-slate-800 text-cyan-400" class="flex items-center space-x-4 p-3 rounded-xl hover:bg-slate-800 transition-all text-slate-400 hover:text-cyan-400 group cursor-pointer">
        <svg lucideUsers class="h-6 w-6 shrink-0"></svg>
        <span *ngIf="!(isSidebarCollapsed$ | async)" class="font-medium whitespace-nowrap">Client Dashboard</span>
      </a>
      
      <a routerLink="/partner" routerLinkActive="bg-slate-800 text-cyan-400" class="flex items-center space-x-4 p-3 rounded-xl hover:bg-slate-800 transition-all text-slate-400 hover:text-cyan-400 group cursor-pointer">
        <svg lucideTruck class="h-6 w-6 shrink-0"></svg>
        <span *ngIf="!(isSidebarCollapsed$ | async)" class="font-medium whitespace-nowrap">Fleet Hub</span>
      </a>
      
      <a routerLink="/billing" routerLinkActive="bg-slate-800 text-cyan-400" class="flex items-center space-x-4 p-3 rounded-xl hover:bg-slate-800 transition-all text-slate-400 hover:text-cyan-400 group cursor-pointer">
        <svg lucideReceiptText class="h-6 w-6 shrink-0"></svg>
        <span *ngIf="!(isSidebarCollapsed$ | async)" class="font-medium whitespace-nowrap">Billing & Escrow</span>
      </a>
    </nav>
  </div>
  
  <div class="p-4 border-t border-slate-800 text-xs text-center text-slate-600 whitespace-nowrap" *ngIf="!(isSidebarCollapsed$ | async)">
    © 2026 Agnib
  </div>
</aside>
