<div *ngIf="isChatEnabled" cdkDrag class="fixed bottom-6 right-6 w-[22rem] max-w-[calc(100vw-1.5rem)] bg-slate-950/95 border border-slate-700 shadow-2xl shadow-cyan-900/20 rounded-2xl flex flex-col z-[99999] overflow-hidden backdrop-blur-xl transform transition-all duration-300 pointer-events-auto"
     [ngClass]="isMinimized ? 'h-14' : 'h-[28rem]'">
  
  <div cdkDragHandle class="bg-gradient-to-r from-slate-900 to-cyan-950 border-b border-slate-800 p-3 flex justify-between items-center cursor-move active:cursor-grabbing">
    <div class="flex items-center space-x-2">
      <div class="w-2 h-2 rounded-full bg-cyan-400 animate-ping"></div>
      <span class="text-xs font-bold uppercase tracking-wider text-cyan-400 select-none">Order Chat</span>
    </div>
    
    <button type="button" (click)="toggleMinimize()" class="text-slate-400 hover:text-white transition-colors p-1" title="Minimize chat assistant" aria-label="Minimize chat assistant">
      <svg lucideChevronDown *ngIf="!isMinimized" class="h-4 w-4"></svg>
      <svg lucideChevronUp *ngIf="isMinimized" class="h-4 w-4"></svg>
    </button>
  </div>

  <div *ngIf="!isMinimized" #scrollMe class="flex-1 p-4 overflow-y-auto space-y-4 text-xs bg-slate-900/50 scroll-smooth">
    
    <div *ngFor="let msg of messages" class="flex" [ngClass]="msg.sender === 'user' ? 'justify-end' : 'justify-start'">
      
      <div *ngIf="msg.sender !== (currentUser?.entityName || 'You')" class="bg-slate-800 p-2.5 rounded-xl rounded-tl-sm border border-slate-700 text-slate-300 max-w-[85%] shadow-md">
        {{ msg.text }}
      </div>
      
      <div *ngIf="msg.sender === (currentUser?.entityName || 'You')" class="bg-cyan-900/60 p-2.5 rounded-xl rounded-tr-sm border border-cyan-800/50 text-cyan-100 max-w-[85%] shadow-md text-right">
        {{ msg.text }}
      </div>
      
    </div>
  </div>

  <div *ngIf="!isMinimized" class="p-2 border-t border-slate-800 bg-slate-950/95 flex items-center space-x-2">
    <input type="text" 
           [(ngModel)]="userInput" 
           (keyup.enter)="sendMessage()"
           placeholder="Message the customer about this order..." 
           class="w-full text-xs bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 placeholder-slate-600 transition-colors">
    <button type="button" (click)="sendMessage()" [disabled]="isLoading" class="p-2 bg-cyan-900 hover:bg-cyan-800 disabled:opacity-60 text-cyan-400 rounded-lg transition-colors" title="Send message" aria-label="Send message">
      <svg lucideSendHorizontal class="h-4 w-4"></svg>
    </button>
  </div>
</div>
