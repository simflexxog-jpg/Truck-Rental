<div cdkDrag class="fixed bottom-6 right-6 w-80 bg-slate-950 border border-slate-700 shadow-2xl shadow-cyan-900/20 rounded-2xl flex flex-col z-50 overflow-hidden transform transition-all duration-300"
     [ngClass]="isMinimized ? 'h-14' : 'h-96'">
  
  <div cdkDragHandle class="bg-gradient-to-r from-slate-900 to-cyan-950 border-b border-slate-800 p-3 flex justify-between items-center cursor-move active:cursor-grabbing">
    <div class="flex items-center space-x-2">
      <div class="w-2 h-2 rounded-full bg-cyan-400 animate-ping"></div>
      <span class="text-xs font-bold uppercase tracking-wider text-cyan-400 select-none">LogiAI Assistant</span>
    </div>
    
    <button (click)="toggleMinimize()" class="text-slate-400 hover:text-white transition-colors p-1">
      <svg *ngIf="!isMinimized" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      <svg *ngIf="isMinimized" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>
    </button>
  </div>

  <div *ngIf="!isMinimized" #scrollMe class="flex-1 p-4 overflow-y-auto space-y-4 text-xs bg-slate-900/50 scroll-smooth">
    
    <div *ngFor="let msg of messages" class="flex" [ngClass]="msg.sender === 'user' ? 'justify-end' : 'justify-start'">
      
      <div *ngIf="msg.sender === 'ai'" class="bg-slate-800 p-2.5 rounded-xl rounded-tl-sm border border-slate-700 text-slate-300 max-w-[85%] shadow-md">
        {{ msg.text }}
      </div>
      
      <div *ngIf="msg.sender === 'user'" class="bg-cyan-900/60 p-2.5 rounded-xl rounded-tr-sm border border-cyan-800/50 text-cyan-100 max-w-[85%] shadow-md text-right">
        {{ msg.text }}
      </div>
      
    </div>
  </div>

  <div *ngIf="!isMinimized" class="p-2 border-t border-slate-800 bg-slate-950 flex items-center space-x-2">
    <input type="text" 
           [(ngModel)]="userInput" 
           (keyup.enter)="sendMessage()"
           placeholder="Consult operational AI..." 
           class="w-full text-xs bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-slate-200 focus:outline-none focus:border-cyan-500 placeholder-slate-600 transition-colors">
    <button (click)="sendMessage()" class="p-2 bg-cyan-900 hover:bg-cyan-800 text-cyan-400 rounded-lg transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform rotate-90" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"/></svg>
    </button>
  </div>
</div>
