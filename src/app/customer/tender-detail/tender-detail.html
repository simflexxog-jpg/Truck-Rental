<div class="bg-slate-950 border border-slate-800 p-4 rounded-lg">
  <h4 class="text-sm font-bold text-slate-200 mb-2">Tender Details</h4>

  <div *ngIf="tender">
    <p class="text-xs text-slate-400">{{ tender.title }} — {{ tender.origin }} → {{ tender.destination }}</p>
    <p class="text-xs text-slate-400 mt-1">Status: <span class="font-mono text-cyan-300">{{ tender.status }}</span></p>

    <div class="flex items-center justify-between gap-4">
      <div>
        <h5 class="text-xs text-slate-400 mb-2">Bids</h5>
        <div *ngIf="tender.bids.length === 0" class="text-xs text-slate-500">No bids yet.</div>
      </div>
      <div *ngIf="tender.auctionEnd" class="text-xs text-slate-500">
        Auction ends in <app-timer [targetTime]="tender.auctionEnd"></app-timer>
      </div>
    </div>

      <div *ngFor="let bid of tender.bids" class="flex items-center justify-between bg-slate-900 p-2 rounded mb-2">
        <div>
          <div class="text-sm font-bold text-slate-200">{{ bid.partnerName }}</div>
          <div class="text-xs text-slate-400">Amount: {{ bid.bidAmount | currency:'INR':'symbol':'1.2-2' }}</div>
        </div>
        <div class="flex items-center gap-2">
          <button (click)="reject(bid)" class="px-2 py-1 bg-rose-700 rounded text-xs">Reject</button>
          <button (click)="accept(bid)" class="px-2 py-1 bg-emerald-600 rounded text-xs">Accept</button>
        </div>
      </div>

    <button *ngIf="tender && tender.status === 'assigned'" (click)="goToPayment()" class="mt-4 w-full rounded-2xl bg-cyan-600 px-4 py-2 text-xs font-semibold text-white">Pay for this order</button>

    <div *ngIf="message" class="text-xs text-slate-300 mt-2">{{ message }}</div>
  </div>
  <div *ngIf="!tender" class="text-xs text-slate-500">Tender not found.</div>
</div>
