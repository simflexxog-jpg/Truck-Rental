<div class="bg-slate-950 border border-slate-800 p-4 rounded-2xl shadow-xl">
  <div class="flex justify-between items-center mb-3">
    <div>
      <h4 class="text-xs font-bold uppercase tracking-wider text-slate-400">Live Route Monitor</h4>
      <p class="text-[10px] text-slate-500 mt-0.5">{{ originNode }} → {{ destinationNode }}</p>
    </div>
    <span class="text-[10px] text-slate-400 bg-slate-900 px-2 py-0.5 rounded-md border border-slate-800 font-mono tracking-widest animate-pulse">
      GPS Signal: Active
    </span>
  </div>
  
  <div class="w-full h-96 bg-slate-900 rounded-xl relative overflow-hidden border border-slate-800 shadow-lg">
    <div #mapContainer id="map-container" class="w-full h-full"></div>
  </div>

  <!-- Map Info -->
  <div class="mt-3 grid grid-cols-3 gap-2">
    <div class="bg-slate-900 border border-slate-800 p-2 rounded-lg">
      <p class="text-[10px] text-slate-500">Latitude</p>
      <p class="text-sm font-mono text-cyan-400">{{ currentLocation.lat | number:'1.4-4' }}</p>
    </div>
    <div class="bg-slate-900 border border-slate-800 p-2 rounded-lg">
      <p class="text-[10px] text-slate-500">Longitude</p>
      <p class="text-sm font-mono text-cyan-400">{{ currentLocation.lng | number:'1.4-4' }}</p>
    </div>
    <div class="bg-slate-900 border border-slate-800 p-2 rounded-lg">
      <p class="text-[10px] text-slate-500">Updates Received</p>
      <p class="text-sm font-mono text-cyan-400">{{ routeUpdates.length }}</p>
    </div>
  </div>
</div>
