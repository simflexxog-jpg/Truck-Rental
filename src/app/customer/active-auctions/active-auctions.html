<div class="bg-slate-950 border border-slate-800 p-6 rounded-2xl shadow-xl">
  <div class="flex justify-between items-center mb-4">
    <h3 class="text-sm font-bold uppercase tracking-wider text-slate-300">Active Dynamic Auction Frameworks</h3>
    <span class="inline-flex items-center text-[10px] bg-cyan-950 text-cyan-400 border border-cyan-800 px-2 py-0.5 rounded font-mono">Real-time Stream Engine</span>
  </div>
  
  <div class="overflow-x-auto">
    <table class="w-full text-left text-xs">
      <thead>
        <tr class="border-b border-slate-800 text-slate-400 uppercase tracking-wider font-semibold">
          <th class="pb-3 px-2">Manifest ID</th>
          <th class="pb-3 px-2">Auction Timer</th>
          <th class="pb-3 px-2">Current Lowest Tender</th>
          <th class="pb-3 px-2">Leading Operator Node</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-800/40 text-slate-300">
        <tr *ngFor="let tender of activeTenders" class="hover:bg-slate-900/30 transition-all duration-150">
          <td class="py-4 px-2 font-semibold text-cyan-400">{{ tender.id }}</td>
          <td class="py-4 px-2 text-amber-400 font-mono tracking-wide">{{ tender.timer }}</td>
          <td class="py-4 px-2 font-bold text-emerald-400 font-mono">{{ tender.lowestBid | currency:'USD' }}</td>
          <td class="py-4 px-2 text-slate-300 flex items-center justify-between">
            <span>{{ tender.leadingPartner }}</span>
            <button class="bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-cyan-400 border border-slate-700/60 p-1.5 rounded-lg transition-colors ml-2">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
