<div class="min-h-[80vh] flex items-center justify-center p-4 bg-slate-950">
  <div class="w-full max-w-md bg-slate-950 border border-slate-800 p-8 rounded-3xl shadow-[0_28px_80px_-40px_rgba(14,165,233,0.55)] overflow-hidden">
    <div class="mb-8">
      <div class="text-sm uppercase tracking-[0.3em] text-slate-500 mb-4">Renta</div>
      <h1 class="text-3xl font-extrabold text-white mb-2">Sign in to continue</h1>
      <p class="text-sm text-slate-400">Choose your role, enter your credentials, and get moving.</p>
    </div>

    <div class="grid grid-cols-2 gap-2 bg-slate-900 p-1.5 rounded-2xl border border-slate-800 mb-6">
      <button type="button"
              (click)="setRole('customer')"
              [ngClass]="selectedRole === 'customer' ? 'bg-white text-slate-950 font-semibold shadow' : 'text-slate-400 hover:text-white'"
              class="py-3 rounded-xl transition-colors text-sm uppercase tracking-[0.18em]">
        Customer
      </button>
      <button type="button"
              (click)="setRole('partner')"
              [ngClass]="selectedRole === 'partner' ? 'bg-white text-slate-950 font-semibold shadow' : 'text-slate-400 hover:text-white'"
              class="py-3 rounded-xl transition-colors text-sm uppercase tracking-[0.18em]">
        Partner
      </button>
    </div>

    <div *ngIf="infoMessage" class="mb-4 rounded-2xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-300">
      {{ infoMessage }}
    </div>

    <div *ngIf="errorMessage" class="mb-4 rounded-2xl border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-sm text-rose-300">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-slate-500 mb-2">Email address</label>
        <input type="email"
               [(ngModel)]="credentials.email"
               name="email"
               placeholder="you@company.com"
               required
               class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 focus:outline-none focus:border-cyan-400 text-sm transition-colors placeholder:text-slate-600" />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-slate-500 mb-2">Password</label>
        <input type="password"
               [(ngModel)]="credentials.password"
               name="password"
               placeholder="••••••••"
               required
               class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 focus:outline-none focus:border-cyan-400 text-sm transition-colors placeholder:text-slate-600" />
      </div>

      <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-950 py-3 rounded-2xl text-sm font-semibold uppercase tracking-[0.16em] transition-all shadow-xl shadow-cyan-500/20">
        Continue
      </button>
    </form>

    <div class="mt-6 text-center text-slate-400 text-sm">
      <p class="mb-3">New to Renta?</p>
      <a [routerLink]="['/register']" [queryParams]="{role: selectedRole}"
         class="inline-block text-cyan-400 hover:text-cyan-300 font-semibold transition-colors">Create an account</a>
    </div>
  </div>
</div>
