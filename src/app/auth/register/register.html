<div class="min-h-[80vh] flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-slate-950 border border-slate-800 p-8 rounded-2xl shadow-2xl relative overflow-hidden group">
    
    <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl group-hover:bg-blue-500/20 transition-all duration-500 pointer-events-none"></div>
    
    <div class="text-center mb-8 relative z-10">
      <h3 class="text-2xl font-bold tracking-tight text-white">Network Initialization</h3>
      <p class="text-xs text-slate-400 mt-1">Define your operational parameters</p>
    </div>

    <div class="grid grid-cols-2 gap-2 bg-slate-900 p-1.5 rounded-xl border border-slate-800 mb-6 relative z-10">
      <button type="button" 
              (click)="setRole('customer')" 
              [ngClass]="selectedRole === 'customer' ? 'bg-blue-500 text-slate-950 shadow-md font-semibold' : 'text-slate-400 hover:text-white'" 
              class="py-2 text-xs rounded-lg transition-all uppercase tracking-wider">
        Freight Owner
      </button>
      <button type="button" 
              (click)="setRole('partner')" 
              [ngClass]="selectedRole === 'partner' ? 'bg-blue-500 text-slate-950 shadow-md font-semibold' : 'text-slate-400 hover:text-white'" 
              class="py-2 text-xs rounded-lg transition-all uppercase tracking-wider">
        Fleet Operator
      </button>
    </div>

    <form (ngSubmit)="onRegister()" class="space-y-4 relative z-10">
      
      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">
          {{ selectedRole === 'customer' ? 'Corporate / Individual Name' : 'Fleet / Driver Name' }}
        </label>
        <input type="text" 
               [(ngModel)]="registerData.entityName" 
               name="entityName" 
               placeholder="Alpha Logistics Corp" 
               required
               class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-blue-400 text-sm transition-colors placeholder:text-slate-600">
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Operational Email Address</label>
        <input type="email" 
               [(ngModel)]="registerData.email" 
               name="email" 
               placeholder="contact@domain.com" 
               required
               class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-blue-400 text-sm transition-colors placeholder:text-slate-600">
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Keyphrase</label>
          <input type="password" 
                 [(ngModel)]="registerData.password" 
                 name="password" 
                 placeholder="••••••••" 
                 required
                 class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-blue-400 text-sm transition-colors placeholder:text-slate-600">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Verify</label>
          <input type="password" 
                 [(ngModel)]="registerData.confirmPassword" 
                 name="confirmPassword" 
                 placeholder="••••••••" 
                 required
                 class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-slate-200 focus:outline-none focus:border-blue-400 text-sm transition-colors placeholder:text-slate-600">
        </div>
      </div>

      <button type="submit" class="w-full mt-2 bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-slate-950 py-3 rounded-xl text-sm font-bold tracking-wide uppercase transition-all shadow-lg shadow-blue-500/20 transform active:scale-[0.98]">
        Initialize Node
      </button>
    </form>
    
    <div class="mt-6 text-center border-t border-slate-800 pt-4 relative z-10">
      <p class="text-xs text-slate-400">
        Already have clearance? 
        <a routerLink="/login" class="text-blue-400 hover:text-blue-300 font-semibold ml-1 transition-colors">Return to Terminal</a>
      </p>
    </div>
  </div>
</div>
