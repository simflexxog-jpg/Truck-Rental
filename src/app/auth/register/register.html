<div class="min-h-[80vh] flex items-center justify-center p-4 bg-slate-950">
  <div class="w-full max-w-md bg-slate-950 border border-slate-800 p-8 rounded-3xl shadow-[0_28px_80px_-40px_rgba(59,130,246,0.55)] overflow-hidden">
    <div class="mb-8">
      <div class="text-sm uppercase tracking-[0.3em] text-slate-500 mb-4">Renta</div>
      <h1 class="text-3xl font-extrabold text-white mb-2">Create your account</h1>
      <p class="text-sm text-slate-400">Register as a customer or partner and access your dashboard.</p>
    </div>

    <div class="grid grid-cols-2 gap-2 bg-slate-900 p-1.5 rounded-2xl border border-slate-800 mb-6">
      <button type="button"
              (click)="setRole('customer')"
              [ngClass]="selectedRole === 'customer' ? 'bg-white text-slate-950 font-semibold shadow' : 'text-slate-400 hover:text-white'"
              class="py-3 rounded-xl transition-colors text-sm uppercase tracking-[0.18em]">
        Customer
      </button>
      <button type="button"
              (click)="setRole('partner')"
              [ngClass]="selectedRole === 'partner' ? 'bg-white text-slate-950 font-semibold shadow' : 'text-slate-400 hover:text-white'"
              class="py-3 rounded-xl transition-colors text-sm uppercase tracking-[0.18em]">
        Partner
      </button>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="space-y-5">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-slate-500 mb-2">First name</label>
          <input formControlName="firstName" type="text" placeholder="Jane" title="First name" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 focus:outline-none focus:border-cyan-400 text-sm transition-colors placeholder:text-slate-600" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-slate-500 mb-2">Last name</label>
          <input formControlName="lastName" type="text" placeholder="Doe" title="Last name" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 focus:outline-none focus:border-cyan-400 text-sm transition-colors placeholder:text-slate-600" />
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-slate-500 mb-2">Email address</label>
        <input formControlName="email" type="email" placeholder="you@domain.com" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 focus:outline-none focus:border-cyan-400 text-sm transition-colors placeholder:text-slate-600" />
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-slate-500 mb-2">Phone number</label>
        <input formControlName="phoneNumber" type="text" placeholder="+15551234567" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 focus:outline-none focus:border-cyan-400 text-sm transition-colors placeholder:text-slate-600" />
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-slate-500 mb-2">Password</label>
          <input formControlName="password" type="password" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 focus:outline-none focus:border-cyan-400 text-sm transition-colors placeholder:text-slate-600" />
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-slate-500 mb-2">Confirm</label>
          <input formControlName="confirmPassword" type="password" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 focus:outline-none focus:border-cyan-400 text-sm transition-colors placeholder:text-slate-600" />
        </div>
      </div>

      <div *ngIf="selectedRole === 'driver'" class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
        <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-slate-500 mb-2">License number</label>
        <input formControlName="licenseNumber" type="text" placeholder="DL-123456" title="License number" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 focus:outline-none focus:border-cyan-400 text-sm transition-colors placeholder:text-slate-600" />
      </div>

      <div class="rounded-2xl border border-slate-800 bg-slate-900/70 p-4">
        <label class="block text-xs font-semibold uppercase tracking-[0.16em] text-slate-500 mb-2">Company / organization</label>
        <input formControlName="companyName" type="text" placeholder="Renta Logistics" title="Company / organization" class="w-full bg-slate-900 border border-slate-800 rounded-2xl px-4 py-3 text-slate-100 focus:outline-none focus:border-cyan-400 text-sm transition-colors placeholder:text-slate-600" />
      </div>

      <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-slate-950 py-3 rounded-2xl text-sm font-semibold uppercase tracking-[0.16em] transition-all shadow-xl shadow-blue-500/20">
        Continue
      </button>
    </form>

    <div class="mt-6 text-center text-slate-400 text-sm">
      <p class="mb-3">Already registered?</p>
      <a [routerLink]="['/login']" [queryParams]="{role: selectedRole}"
         class="inline-block text-cyan-400 hover:text-cyan-300 font-semibold transition-colors">Sign in</a>
    </div>
  </div>
</div>
