<div class="flex h-screen bg-slate-900 text-slate-100 font-sans overflow-hidden">
  
  <app-sidebar class="z-40"></app-sidebar>

  <div class="flex-1 flex flex-col h-full overflow-hidden relative bg-slate-900 w-full">
    
    <app-header [isSidebarCollapsed]="(isSidebarCollapsed$ | async) ?? false" class="z-30 flex-shrink-0 w-full"></app-header>
    
    <main class="flex-1 flex flex-col h-full overflow-y-auto relative bg-slate-900 w-full">
      <div [ngClass]="(isSidebarCollapsed$ | async) ?? false ? 'ml-20' : 'ml-64'" class="p-8 transition-all duration-300 h-full">
        <router-outlet></router-outlet>
      </div>
    </main>
    
  </div>

  <app-ai-chatbox class="z-50"></app-ai-chatbox>

</div>
