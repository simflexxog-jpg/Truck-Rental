<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify your Renta account</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.5;
        color: #0f172a;
        margin: 0;
        padding: 24px;
        background-color: #f8fafc;
      }
      .card {
        max-width: 560px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      .button {
        display: inline-block;
        padding: 10px 16px;
        background: #2563eb;
        color: #ffffff;
        text-decoration: none;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Verify your Renta account</h2>
      <p>Thanks for signing up. Use the link below to verify your email address.</p>
      <p><a href="{{verificationUrl}}" class="button">Verify email</a></p>
      <p>If you did not create this account, you can ignore this email.</p>
    </div>
  </body>
</html>
